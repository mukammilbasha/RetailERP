# ─── API Gateway ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: retailerp
  labels:
    app: gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: retailerp/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: retailerp-config
          env:
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: retailerp-secrets
                  key: jwt-secret
            # Override YARP cluster destinations for K8s service names
            - name: ReverseProxy__Clusters__auth-cluster__Destinations__auth-api__Address
              value: "http://auth-api-svc"
            - name: ReverseProxy__Clusters__product-cluster__Destinations__product-api__Address
              value: "http://product-api-svc"
            - name: ReverseProxy__Clusters__inventory-cluster__Destinations__inventory-api__Address
              value: "http://inventory-api-svc"
            - name: ReverseProxy__Clusters__order-cluster__Destinations__order-api__Address
              value: "http://order-api-svc"
            - name: ReverseProxy__Clusters__production-cluster__Destinations__production-api__Address
              value: "http://production-api-svc"
            - name: ReverseProxy__Clusters__billing-cluster__Destinations__billing-api__Address
              value: "http://billing-api-svc"
            - name: ReverseProxy__Clusters__reporting-cluster__Destinations__reporting-api__Address
              value: "http://reporting-api-svc"
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: retailerp
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: retailerp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
