x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: "Docker"
  ASPNETCORE_URLS: "http://+:8080"
  Urls: "http://+:8080"
  ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=RetailERP;User Id=sa;Password=RetailERP@2024!;TrustServerCertificate=true;MultipleActiveResultSets=true"
  Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
  Jwt__Issuer: "RetailERP.Auth"
  Jwt__Audience: "RetailERP.Client"
  Cors__Origins__0: "http://localhost:3000"
  Cors__Origins__1: "http://localhost:3003"
  Cors__Origins__2: "http://frontend:3000"
  Cors__Origins__3: "http://192.168.1.128:3000"
  Cors__Origins__4: "http://192.168.1.128:3003"

services:
  # ─── Infrastructure ─────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: retailerp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "RetailERP@2024!"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - retailerp-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "RetailERP@2024!" -Q "SELECT 1" -C -b
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: retailerp-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - retailerp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Database Initialization ────────────────────────────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: retailerp-db-init
    networks:
      - retailerp-network
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./database:/database
    restart: "no"
    user: root
    entrypoint: /bin/bash
    command: >
      -c "
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd;
        echo 'Initializing RetailERP database...';
        $$SQLCMD -S sqlserver -U sa -P 'RetailERP@2024!' -C -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name='RetailERP') CREATE DATABASE [RetailERP]\";
        for f in /database/schemas/*.sql /database/tables/*.sql /database/indexes/*.sql /database/stored-procedures/*.sql /database/seed-data/*.sql; do
          if [ -f \"$$f\" ]; then
            echo \"  Running $$f ...\";
            $$SQLCMD -S sqlserver -U sa -P 'RetailERP@2024!' -C -d RetailERP -i \"$$f\";
            echo \"  Done: $$f\";
          fi;
        done;
        echo 'Database initialization complete!';
      "

  # ─── Observability ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: retailerp-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - retailerp-network

  grafana:
    image: grafana/grafana:latest
    container_name: retailerp-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - retailerp-network
    depends_on:
      - prometheus

  # ─── Auth Service (port 5001) ───────────────────────────
  auth-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SERVICE_NAME: Auth
        SERVICE_DIR: auth
    container_name: retailerp-auth
    ports:
      - "5001:8080"
    environment:
      <<: *common-env
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Product Service (port 5002) ────────────────────────
  product-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SERVICE_NAME: Product
        SERVICE_DIR: product
    container_name: retailerp-product
    ports:
      - "5002:8080"
    environment:
      <<: *common-env
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # ─── Inventory Service (port 5003) ─────────────────────
  inventory-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SERVICE_NAME: Inventory
        SERVICE_DIR: inventory
    container_name: retailerp-inventory
    ports:
      - "5003:8080"
    environment:
      <<: *common-env
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # ─── Order Service (port 5004) ──────────────────────────
  order-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SERVICE_NAME: Order
        SERVICE_DIR: order
    container_name: retailerp-order
    ports:
      - "5004:8080"
    environment:
      <<: *common-env
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # ─── Production Service (port 5005) ────────────────────
  production-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SERVICE_NAME: Production
        SERVICE_DIR: production
    container_name: retailerp-production
    ports:
      - "5005:8080"
    environment:
      <<: *common-env
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # ─── Billing Service (port 5006) ───────────────────────
  billing-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SERVICE_NAME: Billing
        SERVICE_DIR: billing
    container_name: retailerp-billing
    ports:
      - "5006:8080"
    environment:
      <<: *common-env
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # ─── Reporting Service (port 5007) ─────────────────────
  reporting-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SERVICE_NAME: Reporting
        SERVICE_DIR: reporting
    container_name: retailerp-reporting
    ports:
      - "5007:8080"
    environment:
      <<: *common-env
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # ─── API Gateway (port 5000) ────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: retailerp-gateway
    ports:
      - "5000:8080"
    environment:
      <<: *common-env
      Cors__Origins__0: "http://localhost:3000"
      Cors__Origins__1: "http://localhost:3001"
      Cors__Origins__2: "http://localhost:3003"
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      auth-api:
        condition: service_healthy

  # ─── Frontend (port 3003) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: "http://gateway:8080"
    container_name: retailerp-frontend
    ports:
      - "3003:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://gateway:8080"
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      - gateway
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3000 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Docs UI (port 3100) ───────────────────────────────
  docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    container_name: retailerp-docs
    ports:
      - "3100:3100"
    networks:
      - retailerp-network
    restart: unless-stopped
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3100 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sqlserver-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  retailerp-network:
    driver: bridge
