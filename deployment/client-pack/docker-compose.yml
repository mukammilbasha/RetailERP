# RetailERP — Offline Client Deployment
# All images loaded from local tar files (no internet required)
# SQL Server: connects to existing SQL Server Express on host machine
# No Grafana / Prometheus / SQL Docker container

services:

  redis:
    image: redis:7-alpine
    container_name: retailerp-redis
    volumes:
      - redis-data:/data
    networks:
      - retailerp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  auth-api:
    image: mukammilbasha/retailerp:auth-api
    container_name: retailerp-auth
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  product-api:
    image: mukammilbasha/retailerp:product-api
    container_name: retailerp-product
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped

  inventory-api:
    image: mukammilbasha/retailerp:inventory-api
    container_name: retailerp-inventory
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped

  order-api:
    image: mukammilbasha/retailerp:order-api
    container_name: retailerp-order
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped

  production-api:
    image: mukammilbasha/retailerp:production-api
    container_name: retailerp-production
    ports:
      - "5005:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped

  billing-api:
    image: mukammilbasha/retailerp:billing-api
    container_name: retailerp-billing
    ports:
      - "5006:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped

  reporting-api:
    image: mukammilbasha/retailerp:reporting-api
    container_name: retailerp-reporting
    ports:
      - "5007:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped

  gateway:
    image: mukammilbasha/retailerp:gateway
    container_name: retailerp-gateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal\\SQLEXPRESS;Database=RetailERP;User Id=ERPAdmin;Password=ERP@admin;TrustServerCertificate=true"
      Jwt__Secret: "RetailERP-SuperSecret-JWT-Key-2024-Must-Be-At-Least-32-Characters"
      Jwt__Issuer: "RetailERP.Auth"
      Jwt__Audience: "RetailERP.Client"
      Cors__Origins__0: "http://localhost:3003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      auth-api:
        condition: service_healthy

  frontend:
    image: mukammilbasha/retailerp:frontend
    container_name: retailerp-frontend
    ports:
      - "3003:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
    networks:
      - retailerp-network
    restart: unless-stopped
    depends_on:
      - gateway
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3000 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  docs:
    image: mukammilbasha/retailerp:docs
    container_name: retailerp-docs
    ports:
      - "3100:3100"
    networks:
      - retailerp-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  retailerp-network:
    driver: bridge
