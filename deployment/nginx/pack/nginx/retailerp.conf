# =============================================================================
# RetailERP - Nginx Reverse Proxy Configuration
# Target: Ubuntu 22.04/20.04
# =============================================================================
# Layout:
#   Port 80   - Frontend (Next.js) served at /
#   /api/     - Proxied to API Gateway (http://127.0.0.1:5000)
#   /ws/      - WebSocket proxy to API Gateway
#   5000-5007 - Individual service ports (direct access, optional)
# =============================================================================

# ---- Upstream definitions ---------------------------------------------------
upstream retailerp_gateway    { server 127.0.0.1:5000; keepalive 32; }
upstream retailerp_auth       { server 127.0.0.1:5001; keepalive 16; }
upstream retailerp_product    { server 127.0.0.1:5002; keepalive 16; }
upstream retailerp_inventory  { server 127.0.0.1:5003; keepalive 16; }
upstream retailerp_order      { server 127.0.0.1:5004; keepalive 16; }
upstream retailerp_production { server 127.0.0.1:5005; keepalive 16; }
upstream retailerp_billing    { server 127.0.0.1:5006; keepalive 16; }
upstream retailerp_reporting  { server 127.0.0.1:5007; keepalive 16; }
upstream retailerp_frontend   { server 127.0.0.1:3003; keepalive 16; }

# ---- Shared proxy settings map ----------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =============================================================================
# Main HTTP server - Frontend + API Gateway
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ---- Logging ------------------------------------------------------------
    access_log /var/log/nginx/retailerp-access.log combined;
    error_log  /var/log/nginx/retailerp-error.log warn;

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ---- gzip compression ---------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ---- Client settings ----------------------------------------------------
    client_max_body_size     50m;
    client_body_buffer_size  128k;

    # ---- Timeouts -----------------------------------------------------------
    proxy_connect_timeout    60s;
    proxy_send_timeout       60s;
    proxy_read_timeout       60s;

    # ---- WebSocket endpoint -------------------------------------------------
    location /ws/ {
        proxy_pass         http://retailerp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- API Gateway (/api/) ------------------------------------------------
    location /api/ {
        proxy_pass         http://retailerp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ---- Next.js static assets with long-term caching -----------------------
    location /_next/static/ {
        proxy_pass         http://retailerp_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        add_header         Cache-Control     "public, max-age=31536000, immutable";
        access_log         off;
    }

    location /favicon.ico {
        proxy_pass         http://retailerp_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    location /public/ {
        proxy_pass         http://retailerp_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ---- Frontend (catch-all) -----------------------------------------------
    location / {
        proxy_pass         http://retailerp_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# Direct service access - API Gateway (port 5000)
# =============================================================================
server {
    listen 5000;
    server_name _;

    access_log /var/log/nginx/retailerp-gateway-access.log combined;
    error_log  /var/log/nginx/retailerp-gateway-error.log warn;

    location / {
        proxy_pass         http://retailerp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

