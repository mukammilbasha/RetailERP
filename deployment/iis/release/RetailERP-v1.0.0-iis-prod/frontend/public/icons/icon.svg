<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f97316" flood-opacity="0.35"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="508" height="508" x="2" y="2" rx="106" ry="106" fill="none" stroke="#334155" stroke-width="2" opacity="0.5"/>

  <!-- Orange accent bar at top -->
  <rect x="80" y="72" width="352" height="4" rx="2" fill="url(#orangeGrad)" opacity="0.6"/>

  <!-- EC Text -->
  <text
    x="256"
    y="320"
    text-anchor="middle"
    fill="url(#orangeGrad)"
    font-size="220"
    font-weight="800"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    letter-spacing="-8"
    filter="url(#textShadow)"
  >EC</text>

  <!-- Subtle tagline -->
  <text
    x="256"
    y="392"
    text-anchor="middle"
    fill="#94a3b8"
    font-size="36"
    font-weight="500"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    letter-spacing="12"
  >RETAIL</text>

  <!-- Orange accent bar at bottom -->
  <rect x="80" y="436" width="352" height="4" rx="2" fill="url(#orangeGrad)" opacity="0.6"/>
</svg>
