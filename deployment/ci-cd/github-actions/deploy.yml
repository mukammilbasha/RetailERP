name: RetailERP — Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options: [dev, qa, uat, prod]
      target:
        description: 'Deployment target'
        required: true
        type: choice
        options: [docker, aws, azure, gcp]
      version:
        description: 'Image version/tag (leave blank for git SHA)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  VERSION: ${{ github.event.inputs.version || github.sha }}

# ── Build jobs (all run in parallel) ─────────────────────────
jobs:
  build-auth:
    name: Build Auth API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
    - uses: actions/checkout@v4
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/retailerp-auth
        tags: |
          type=sha,prefix=,format=short
          type=ref,event=tag
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        build-args: |
          SERVICE_NAME=Auth
          SERVICE_DIR=auth
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha,scope=auth
        cache-to: type=gha,mode=max,scope=auth

  build-product:
    name: Build Product API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        build-args: |
          SERVICE_NAME=Product
          SERVICE_DIR=product
        push: true
        tags: ${{ env.REGISTRY }}/retailerp-product:${{ env.VERSION }}
        cache-from: type=gha,scope=product
        cache-to: type=gha,mode=max,scope=product

  build-inventory:
    name: Build Inventory API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        build-args: |
          SERVICE_NAME=Inventory
          SERVICE_DIR=inventory
        push: true
        tags: ${{ env.REGISTRY }}/retailerp-inventory:${{ env.VERSION }}
        cache-from: type=gha,scope=inventory
        cache-to: type=gha,mode=max,scope=inventory

  build-order:
    name: Build Order API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        build-args: |
          SERVICE_NAME=Order
          SERVICE_DIR=order
        push: true
        tags: ${{ env.REGISTRY }}/retailerp-order:${{ env.VERSION }}
        cache-from: type=gha,scope=order
        cache-to: type=gha,mode=max,scope=order

  build-billing:
    name: Build Billing API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        build-args: |
          SERVICE_NAME=Billing
          SERVICE_DIR=billing
        push: true
        tags: ${{ env.REGISTRY }}/retailerp-billing:${{ env.VERSION }}
        cache-from: type=gha,scope=billing
        cache-to: type=gha,mode=max,scope=billing

  build-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.gateway
        push: true
        tags: ${{ env.REGISTRY }}/retailerp-gateway:${{ env.VERSION }}
        cache-from: type=gha,scope=gateway
        cache-to: type=gha,mode=max,scope=gateway

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: src/frontend
        file: docker/Dockerfile.frontend
        build-args: |
          NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_VERSION=${{ env.VERSION }}
        push: true
        tags: ${{ env.REGISTRY }}/retailerp-frontend:${{ env.VERSION }}
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,mode=max,scope=frontend

  # ── Security scan (after all builds) ─────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-auth, build-product, build-inventory, build-order, build-billing, build-gateway, build-frontend]
    steps:
    - name: Scan Auth API
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/retailerp-auth:${{ env.VERSION }}
        format: sarif
        output: trivy-auth.sarif
        severity: CRITICAL,HIGH
        exit-code: '0'    # Don't fail on scan (report only)
    - name: Scan Frontend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/retailerp-frontend:${{ env.VERSION }}
        format: sarif
        output: trivy-frontend.sarif
        severity: CRITICAL,HIGH
        exit-code: '0'
    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: '.'

  # ── Deploy Dev (auto on main push) ───────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'dev'
    environment:
      name: dev
      url: http://dev.retailerp.internal
    steps:
    - uses: actions/checkout@v4
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    - name: Configure kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    - name: Apply Kubernetes manifests
      run: |
        export KUBECONFIG=kubeconfig
        export IMAGE_REGISTRY=${{ env.REGISTRY }}
        export VERSION=${{ env.VERSION }}
        envsubst < deployment/kubernetes/namespace.yaml | kubectl apply -f -
        envsubst < deployment/kubernetes/configmap.yaml | kubectl apply -f - --namespace retailerp-dev
        envsubst < deployment/kubernetes/deployments/all-services.yaml | \
          sed 's/namespace: retailerp-prod/namespace: retailerp-dev/g' | kubectl apply -f -
    - name: Wait for rollout
      run: |
        export KUBECONFIG=kubeconfig
        for svc in gateway auth-api product-api inventory-api order-api billing-api frontend; do
          kubectl rollout status deployment/$svc -n retailerp-dev --timeout=180s
        done
    - name: Run smoke tests
      run: |
        sleep 15
        bash deployment/tests/smoke/smoke-tests.sh --env dev --base-url http://dev.retailerp.internal

  # ── Deploy QA (auto after Dev) ────────────────────────────────
  deploy-qa:
    name: Deploy → QA
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: success() && (github.ref == 'refs/heads/main' || github.event.inputs.environment == 'qa')
    environment:
      name: qa
      url: http://qa.retailerp.internal
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-kubectl@v3
    - name: Configure kubeconfig
      run: echo "${{ secrets.KUBE_CONFIG_QA }}" | base64 -d > kubeconfig
    - name: Deploy to QA
      run: |
        export KUBECONFIG=kubeconfig
        export IMAGE_REGISTRY=${{ env.REGISTRY }}
        export VERSION=${{ env.VERSION }}
        envsubst < deployment/kubernetes/deployments/all-services.yaml | \
          sed 's/namespace: retailerp-prod/namespace: retailerp-qa/g' | kubectl apply -f -
    - name: Wait for rollout
      run: |
        export KUBECONFIG=kubeconfig
        for svc in gateway auth-api product-api inventory-api order-api billing-api frontend; do
          kubectl rollout status deployment/$svc -n retailerp-qa --timeout=180s
        done
    - name: Run smoke tests
      run: bash deployment/tests/smoke/smoke-tests.sh --env qa --base-url http://qa.retailerp.internal

  # ── Deploy UAT (manual approval required) ────────────────────
  deploy-uat:
    name: Deploy → UAT
    runs-on: ubuntu-latest
    needs: [deploy-qa]
    if: success() && (startsWith(github.ref, 'refs/tags/') || github.event.inputs.environment == 'uat')
    environment:
      name: uat
      url: https://uat.retailerp.com
    # environment "uat" has required reviewers configured in GitHub Settings
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-kubectl@v3
    - name: Configure kubeconfig
      run: echo "${{ secrets.KUBE_CONFIG_UAT }}" | base64 -d > kubeconfig
    - name: Deploy to UAT
      run: |
        export KUBECONFIG=kubeconfig
        export IMAGE_REGISTRY=${{ env.REGISTRY }}
        export VERSION=${{ env.VERSION }}
        envsubst < deployment/kubernetes/deployments/all-services.yaml | \
          sed 's/namespace: retailerp-prod/namespace: retailerp-uat/g' | kubectl apply -f -
    - name: Wait for rollout
      run: |
        export KUBECONFIG=kubeconfig
        for svc in gateway auth-api product-api inventory-api order-api billing-api frontend; do
          kubectl rollout status deployment/$svc -n retailerp-uat --timeout=180s
        done
    - name: Run smoke tests
      run: bash deployment/tests/smoke/smoke-tests.sh --env uat --base-url https://uat.retailerp.com

  # ── Deploy Production (manual approval + tag required) ────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [deploy-uat]
    if: success() && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'prod')
    environment:
      name: prod
      url: https://retailerp.com
    # environment "prod" has required reviewers + wait timer configured in GitHub Settings
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-kubectl@v3
    - name: Configure kubeconfig
      run: echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
    - name: Deploy to Production (rolling zero-downtime)
      run: |
        export KUBECONFIG=kubeconfig
        export IMAGE_REGISTRY=${{ env.REGISTRY }}
        export VERSION=${{ env.VERSION }}
        kubectl apply -f deployment/kubernetes/namespace.yaml
        kubectl apply -f deployment/kubernetes/configmap.yaml -n retailerp-prod
        envsubst < deployment/kubernetes/deployments/all-services.yaml | kubectl apply -f -
    - name: Wait for rollout
      run: |
        export KUBECONFIG=kubeconfig
        for svc in gateway auth-api product-api inventory-api order-api billing-api frontend; do
          kubectl rollout status deployment/$svc -n retailerp-prod --timeout=300s
        done
    - name: Run production smoke tests
      run: bash deployment/tests/smoke/smoke-tests.sh --env prod --base-url https://retailerp.com
    - name: Tag image as stable
      if: success()
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        for svc in auth product inventory order billing gateway frontend; do
          docker pull ${{ env.REGISTRY }}/retailerp-${svc}:${{ env.VERSION }}
          docker tag ${{ env.REGISTRY }}/retailerp-${svc}:${{ env.VERSION }} \
                     ${{ env.REGISTRY }}/retailerp-${svc}:stable
          docker push ${{ env.REGISTRY }}/retailerp-${svc}:stable
        done
    - name: Notify success
      if: success()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {"text": "✅ RetailERP *${{ env.VERSION }}* deployed to production successfully!"}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── Auto-rollback on production failure ───────────────────────
  rollback-prod:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: failure()
    environment: prod
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-kubectl@v3
    - name: Configure kubeconfig
      run: echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
    - name: Rollback all services
      run: |
        export KUBECONFIG=kubeconfig
        for svc in gateway auth-api product-api inventory-api order-api billing-api frontend; do
          kubectl rollout undo deployment/$svc -n retailerp-prod || true
        done
    - name: Notify rollback
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {"text": "🔴 RetailERP production deployment FAILED and was rolled back! Version: ${{ env.VERSION }}"}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
