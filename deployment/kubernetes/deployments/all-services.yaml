# ─────────────────────────────────────────────────────────────
# Frontend
# ─────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: retailerp-prod
  labels:
    app: frontend
    app.kubernetes.io/part-of: retailerp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels: {app: frontend}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: frontend
        image: ${IMAGE_REGISTRY}/frontend:${VERSION}
        ports: [{containerPort: 3000}]
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.retailerp.com"
        - name: NODE_ENV
          value: "production"
        - name: NEXT_TELEMETRY_DISABLED
          value: "1"
        resources:
          requests: {cpu: 100m, memory: 256Mi}
          limits: {cpu: 500m, memory: 512Mi}
        livenessProbe:
          httpGet: {path: /api/health, port: 3000}
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /api/health, port: 3000}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: retailerp-prod
spec:
  selector: {app: frontend}
  ports: [{port: 80, targetPort: 3000}]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: retailerp-prod
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: frontend}
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource: {name: cpu, target: {type: Utilization, averageUtilization: 70}}
