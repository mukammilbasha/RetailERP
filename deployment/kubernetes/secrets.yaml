# ============================================================
# RetailERP — Kubernetes Secrets Template
# NOTE: Do NOT commit real values. Use a secrets manager:
#   - AWS: External Secrets Operator + AWS Secrets Manager
#   - Azure: CSI Secrets Store Driver + Azure Key Vault
#   - GCP: External Secrets Operator + GCP Secret Manager
#   - On-prem: Sealed Secrets or HashiCorp Vault Agent Injector
#
# To create manually (replace <base64-value> with: echo -n 'value' | base64):
#   kubectl apply -f secrets.yaml -n retailerp-prod
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: retailerp-secrets
  namespace: retailerp-prod
type: Opaque
data:
  # SQL Server connection string (base64)
  # echo -n 'Server=sqlserver;Database=RetailERP;User Id=sa;Password=...;TrustServerCertificate=true' | base64
  ConnectionStrings__DefaultConnection: <base64-encoded-connection-string>

  # JWT secret key (at least 32 chars, base64)
  # echo -n 'your-super-secret-jwt-key-at-least-32-chars' | base64
  Jwt__Secret: <base64-encoded-jwt-secret>

  # Redis connection
  Redis__ConnectionString: <base64-encoded-redis-connection>

  # MQTT credentials
  Mqtt__Username: <base64-encoded-mqtt-username>
  Mqtt__Password: <base64-encoded-mqtt-password>

  # External service API keys
  Payment__ApiKey: <base64-encoded-payment-api-key>
  Email__ApiKey: <base64-encoded-email-api-key>

