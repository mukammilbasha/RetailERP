# ============================================================
# RetailERP — Docker Compose Dev Overrides
# Usage: docker compose -f docker-compose.yml -f deployment/docker/docker-compose.dev.yml up -d
# ============================================================
services:
  auth-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"
      Logging__LogLevel__Microsoft: "Information"
    # Enable remote debugging (VS attach)
    ports:
      - "5001:8080"
      - "5101:5005"  # Debug port

  product-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"
    ports:
      - "5002:8080"
      - "5102:5005"

  inventory-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"
    ports:
      - "5003:8080"
      - "5103:5005"

  order-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"
    ports:
      - "5004:8080"
      - "5104:5005"

  production-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"
    ports:
      - "5005:8080"
      - "5105:5005"

  billing-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"
    ports:
      - "5006:8080"
      - "5106:5005"

  reporting-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"
    ports:
      - "5007:8080"
      - "5107:5005"

  gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__LogLevel__Default: "Debug"

  frontend:
    environment:
      NODE_ENV: "development"
      NEXT_TELEMETRY_DISABLED: "1"
    # Mount source for hot reload (when using next dev)
    volumes:
      - ../../src/frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]

  sqlserver:
    environment:
      MSSQL_PID: "Developer"
    # Verbose SQL logging in dev
    command: >
      /bin/bash -c "
        /opt/mssql/bin/sqlservr &
        sleep 30
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'RetailERP@2024!' -C -Q
        'EXEC sp_configure ''show advanced options'', 1; RECONFIGURE;
         EXEC sp_configure ''max server memory'', 1024; RECONFIGURE;'
        wait
      "

  # ── Dev-only tools ────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: retailerp-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - retailerp-network

  adminer:
    image: adminer:latest
    container_name: retailerp-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: sqlserver
    networks:
      - retailerp-network
    depends_on:
      - sqlserver
